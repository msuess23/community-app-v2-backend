name: Backend checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: community_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d community_app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PROJECT_NAME: Community App Test
      BASE_URL: /api/v1
      SECRET_KEY: test-secret-key-that-is-longer-than-32-characters
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: community_app_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      RUN_POSTGRES_TESTS: "1"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall -q src tests scripts alembic
      - run: pytest -q
